# =============================================================
# NotiFlow — Docker Compose (Web + Cloudflare Tunnel)
# =============================================================
# Prerequisites:
#   1. Copy .env.example to .env and fill in all required values
#   2. Start Supabase first: npx supabase start --workdir packages/supabase
#   3. Then run: docker compose up --build -d
#
# SECURITY: All secrets must be provided via .env file.
#           No default/demo keys — container will fail if missing.
# =============================================================

services:
  # ── Next.js Web Dashboard ─────────────────────────────────
  web:
    container_name: notiflow-web
    image: notiflow-web:${APP_VERSION:-latest}
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:?NEXT_PUBLIC_SUPABASE_ANON_KEY is required in .env}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${NEXT_PUBLIC_FIREBASE_VAPID_KEY:-}
    ports:
      - "3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SUPABASE_URL: http://host.docker.internal:54321
      SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:?required}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required in .env}
      PARSE_API_SECRET: ${PARSE_API_SECRET:?PARSE_API_SECRET is required in .env}
      CRON_SECRET: ${CRON_SECRET:-}
      NEXT_PUBLIC_SUPABASE_URL: http://host.docker.internal:54321
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen3.5:latest
      FCM_SERVICE_ACCOUNT: ${FCM_SERVICE_ACCOUNT:-}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
      NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${NEXT_PUBLIC_FIREBASE_VAPID_KEY:-}
      NEXT_PUBLIC_REALTIME_DISABLED: "true"
      HOSTNAME: 0.0.0.0
    restart: unless-stopped

  # ── Cloudflare Tunnel ─────────────────────────────────────
  cloudflared:
    container_name: notiflow-tunnel
    image: cloudflare/cloudflared:latest
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    depends_on:
      - web
    restart: unless-stopped
